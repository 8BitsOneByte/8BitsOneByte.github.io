<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
    }
    main{
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap:16px;
      padding: 16px;
      box-sizing: border-box;
    }

    .first_test_image{
      /* 不建议把宽度设为原图像像素（2560px），会导致在小屏幕上溢出并影响加载。下面使用响应式设置 */
      width: 100%;
      max-width: 1200px;
      height: auto;
      display: block;
    }
    </style>
</head>
<body>
  <main>
    <h1>Hello World</h1>
    <img class="first_test_image" src="assets/images/first_test_image.png" alt="First Test Image" />
  </main>
</body>
</html>
